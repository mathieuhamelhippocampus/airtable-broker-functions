<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broking Broker — Tâches du jour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3a6b;
    --green: #1a5c3a;
    --amber: #8b5a00;
    --ink: #1c1f26;
    --paper: #ffffff;
    --line: #e4e2dc;
    --muted: #6b6f78;
    --bg: #faf9f6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Figtree', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 28px 32px 22px;
  }

  header .eyebrow {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'EB Garamond', serif;
    font-weight: 600;
    font-size: 32px;
    margin: 0 0 4px;
    color: var(--navy);
  }

  header .meta {
    font-size: 13px;
    color: var(--muted);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .summary {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .summary .stat {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 18px;
    flex: 1;
    min-width: 140px;
  }

  .summary .stat .num {
    font-family: 'EB Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1;
  }

  .summary .stat .label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .client-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .client-card .head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }

  .client-card .name {
    font-family: 'EB Garamond', serif;
    font-size: 19px;
    font-weight: 600;
  }

  .client-card .count {
    font-size: 12px;
    color: var(--muted);
  }

  .reasons {
    padding: 4px 18px 14px;
  }

  .reason {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    border-top: 1px solid var(--line);
    font-size: 14px;
  }

  .reason:first-child { border-top: none; }

  .tag {
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .tag.retard { background: rgba(139,90,0,0.12); color: var(--amber); }
  .tag.event { background: rgba(26,58,107,0.1); color: var(--navy); }

  .reason .detail { color: var(--ink); }
  .reason .detail .date { color: var(--muted); font-size: 13px; }

  .tag.budget { background: rgba(26,92,58,0.12); color: var(--green); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-style: italic;
  }

  .error-box {
    background: #fdf1ee;
    border: 1px solid #e3b9a8;
    color: #7a3420;
    padding: 14px 18px;
    border-radius: 6px;
    font-size: 14px;
  }

  .picks-search {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
    font-family: 'Figtree', sans-serif;
    margin-bottom: 14px;
    box-sizing: border-box;
  }

  .picks-list {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }

  .picks-list .picks-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    font-size: 14px;
  }

  .picks-list .picks-row:first-child { border-top: none; }
  .picks-list .picks-row:hover { background: var(--bg); }
  .picks-list .picks-row .count { font-size: 12px; color: var(--muted); }

  @media (max-width: 600px) {
    header { padding: 20px; }
    header h1 { font-size: 26px; }
    main { padding: 20px 14px 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Broking Broker · Kepler Cheuvreux</div>
  <h1>Qui appeler aujourd'hui</h1>
  <div class="meta" id="generated-at">Chargement…</div>
</header>

<main>
  <div class="summary" id="summary" style="display:none;">
    <div class="stat"><div class="num" id="stat-clients">–</div><div class="label">Clients à contacter</div></div>
    <div class="stat"><div class="num" id="stat-events">–</div><div class="label">Events analysés</div></div>
    <div class="stat"><div class="num" id="stat-total">–</div><div class="label">Clients vérifiés</div></div>
  </div>

  <div id="content" class="loading">Récupération des données Airtable…</div>

  <div id="top-picks-section" style="margin-top: 40px;"></div>

  <div id="personalized-picks-section" style="margin-top: 40px;"></div>
</main>

<script>
const FUNCTION_URL = "/.netlify/functions/get-daily-tasks";
const TOP_PICKS_URL = "/.netlify/functions/get-top-picks";
const TOP_PICKS_HTML_URL = "/top3-du-jour-21juillet.html";
const PERSONALIZED_PICKS_MANIFEST_URL = "/public-picks/manifest.json";

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
}

function reasonHTML(r) {
  if (r.type === "retard") {
    return `
      <div class="reason">
        <span class="tag retard">Retard</span>
        <span class="detail">En retard de <strong>${r.retard}</strong> appel(s) sur son rythme annuel
          ${r.callsRemaining !== null ? `<span class="date">· ${r.callsRemaining} appel(s) restant(s) au quota</span>` : ""}
        </span>
      </div>`;
  }
  return `
    <div class="reason">
      <span class="tag event">Event</span>
      <span class="detail">Éligible pour <strong>${r.eventName}</strong>
        ${r.eventDate ? `<span class="date">· ${formatDate(r.eventDate)}</span>` : ""}
        <span class="date">· ${r.eventType || ""}</span>
      </span>
    </div>`;
}

async function load() {
  try {
    const res = await fetch(FUNCTION_URL);
    const data = await res.json();

    if (!res.ok || data.error) {
      document.getElementById("content").innerHTML =
        `<div class="error-box">Erreur : ${data.error || "réponse invalide du serveur"}</div>`;
      document.getElementById("generated-at").textContent = "Erreur de chargement";
      return;
    }

    document.getElementById("generated-at").textContent =
      "Généré le " + new Date(data.generatedAt).toLocaleString('fr-FR');

    document.getElementById("stat-clients").textContent = data.totalClientsToCall;
    document.getElementById("stat-events").textContent = data.totalEventsChecked;
    document.getElementById("stat-total").textContent = data.totalClientsChecked;
    document.getElementById("summary").style.display = "flex";

    if (data.tasks.length === 0) {
      document.getElementById("content").innerHTML =
        `<div class="empty">Aucun client à contacter aujourd'hui.</div>`;
      return;
    }

    const html = data.tasks.map(task => `
      <div class="client-card">
        <div class="head">
          <div class="name">${task.clientName}${task.totalBudget > 0 ? ` <span class="tag budget" style="margin-left:8px;">${task.budget}K€ + ${task.tradingYTD}K€ = ${task.totalBudget}K€</span>` : ""}${task.callsRemaining !== null ? ` <span class="date" style="margin-left:8px; font-weight:400;">· ${task.callsRemaining} appel(s) restant(s) au quota</span>` : ""}</div>
          <div class="count">${task.reasons.length} raison(s)</div>
        </div>
        <div class="reasons">
          ${task.reasons.map(reasonHTML).join("")}
        </div>
      </div>
    `).join("");

    document.getElementById("content").innerHTML = html;
  } catch (err) {
    document.getElementById("content").innerHTML =
      `<div class="error-box">Erreur réseau : ${err.message}</div>`;
  }
}

function pickCardHTML(p) {
  return `
    <div class="reason" style="flex-direction:column; align-items:stretch; gap:4px;">
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span><strong>${p.name}</strong> <span class="date">${p.ticker}</span></span>
        <span class="tag event">${p.rating}</span>
      </div>
      <div class="detail" style="font-size:12.5px;">${p.summary}</div>
      <div class="date" style="font-size:10.5px;">${p.source}</div>
    </div>`;
}

async function loadTopPicks() {
  try {
    const res = await fetch(TOP_PICKS_URL);
    const data = await res.json();
    if (!res.ok || data.error || !data.clients || data.clients.length === 0) return;

    const html = `
      <div class="summary" style="margin-bottom:16px;">
        <div class="stat"><div class="num">${data.totalPicksToday}</div><div class="label">Picks du jour</div></div>
        <div class="stat"><div class="num">${data.totalClientsMatched}</div><div class="label">Clients matchés</div></div>
      </div>
      <h2 style="font-family:'EB Garamond', serif; font-size:22px; color:var(--navy); margin-bottom:14px;">
        Top 3 du jour — par client
        <a href="${TOP_PICKS_HTML_URL}" target="_blank" style="font-size:12px; margin-left:12px; color:var(--muted);">Voir la note complète →</a>
      </h2>
      ${data.clients.map(c => `
        <div class="client-card">
          <div class="head">
            <div class="name">${c.clientName}</div>
            <div class="count">${c.picks.length} pick(s) matché(s)</div>
          </div>
          <div class="reasons">
            ${c.picks.map(pickCardHTML).join("")}
          </div>
        </div>
      `).join("")}
    `;
    document.getElementById("top-picks-section").innerHTML = html;
  } catch (err) {
    // silencieux : la section Top Picks est secondaire, ne bloque pas le dashboard principal
  }
}

function picksRowHTML(entry) {
  return `
    <a class="picks-row" href="/public-picks/${entry.slug}.html" target="_blank" data-name="${entry.clientName.toLowerCase()}">
      <span>${entry.clientName}</span>
      <span class="count">${entry.pickCount} pick(s) →</span>
    </a>`;
}

async function loadPersonalizedPicks() {
  try {
    const res = await fetch(PERSONALIZED_PICKS_MANIFEST_URL);
    if (!res.ok) return;
    const manifest = await res.json();
    if (!Array.isArray(manifest) || manifest.length === 0) return;

    const html = `
      <h2 style="font-family:'EB Garamond', serif; font-size:22px; color:var(--navy); margin-bottom:14px;">
        Top 3 personnalisé par client
        <span style="font-size:12px; margin-left:12px; color:var(--muted); font-family:'Figtree', sans-serif;">${manifest.length} page(s)</span>
      </h2>
      <input type="text" class="picks-search" id="picks-search" placeholder="Rechercher un client…">
      <div class="picks-list" id="picks-list">
        ${manifest.map(picksRowHTML).join("")}
      </div>
    `;
    document.getElementById("personalized-picks-section").innerHTML = html;

    document.getElementById("picks-search").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll("#picks-list .picks-row").forEach((row) => {
        row.style.display = row.dataset.name.includes(q) ? "flex" : "none";
      });
    });
  } catch (err) {
    // silencieux : la section Top 3 personnalisé est secondaire, ne bloque pas le dashboard principal
  }
}

load();
loadTopPicks();
loadPersonalizedPicks();
</script>

</body>
</html>
